<!DOCTYPE html>
<html lang="en">
<head>
    <title>Crypto Tracker</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root {
            --accent: #f7931a;
            --accent2: #ff6b35;
            --glow: rgba(247, 147, 26, 0.4);
            --bg: #060810;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(247, 147, 26, 0.2);
            --text: #e8eaf0;
            --muted: #5a6070;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated starfield background ── */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Gradient blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 { width: 600px; height: 600px; background: #f7931a; top: -200px; left: -100px; animation: drift1 18s ease-in-out infinite alternate; }
        .blob-2 { width: 500px; height: 500px; background: #3b82f6; bottom: -150px; right: -100px; animation: drift2 22s ease-in-out infinite alternate; }
        .blob-3 { width: 400px; height: 400px; background: #8b5cf6; top: 40%; left: 50%; animation: drift3 26s ease-in-out infinite alternate; }

        @keyframes drift1 { to { transform: translate(80px, 60px) scale(1.15); } }
        @keyframes drift2 { to { transform: translate(-60px, -80px) scale(1.2); } }
        @keyframes drift3 { to { transform: translate(-40px, 40px) scale(0.9); } }

        /* Grid overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(247,147,26,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(247,147,26,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Layout ── */
        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 30px var(--glow);
            animation: pulse-icon 3s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { box-shadow: 0 0 20px var(--glow); }
            50%       { box-shadow: 0 0 50px var(--glow), 0 0 80px rgba(247,147,26,0.2); }
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(1.6rem, 4vw, 2.6rem);
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #f7931a, #ffd580, #f7931a);
            background-size: 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer { to { background-position: 200% center; } }

        .tagline {
            font-size: 0.9rem;
            color: var(--muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* ── Search bar ── */
        .search-wrap {
            display: flex;
            gap: 0;
            max-width: 480px;
            margin: 0 auto 50px;
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            background: var(--surface);
            backdrop-filter: blur(20px);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--glow), 0 20px 60px rgba(0,0,0,0.4);
        }

        .search-icon {
            display: flex; align-items: center; padding: 0 16px;
            color: var(--muted); font-size: 1.1rem;
        }

        .search-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 0;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            letter-spacing: 1px;
            outline: none;
        }

        .search-wrap input::placeholder { color: var(--muted); }

        .search-wrap button {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            padding: 16px 26px;
            color: #000;
            font-family: 'Orbitron', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .search-wrap button:hover { opacity: 0.9; }
        .search-wrap button:active { transform: scale(0.97); }

        /* ── Price Card ── */
        .price-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 40px;
            backdrop-filter: blur(30px);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s ease both;
        }

        .price-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .coin-info { display: flex; align-items: center; gap: 16px; }

        .coin-badge {
            width: 54px; height: 54px;
            background: linear-gradient(135deg, rgba(247,147,26,0.2), rgba(247,147,26,0.05));
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
        }

        .coin-name {
            font-family: 'Orbitron', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .coin-symbol {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .live-badge {
            display: flex; align-items: center; gap: 8px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 0.75rem;
            color: #4ade80;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .live-dot {
            width: 7px; height: 7px;
            background: #4ade80;
            border-radius: 50%;
            animation: blink 1.4s ease-in-out infinite;
        }

        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* ── Price Display ── */
        .price-display {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 20px;
            margin-bottom: 32px;
        }

        .price-label {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .price-main {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2rem, 5vw, 3.4rem);
            font-weight: 900;
            background: linear-gradient(90deg, #fff, #ffd580);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .price-change {
            text-align: right;
        }

        .change-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 100px;
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .change-pill.up   { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
        .change-pill.down { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 16px 20px;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .stat-value {
            font-family: 'Orbitron', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
        }

        /* ── Chart Card ── */
        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(30px);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s 0.15s ease both;
        }

        .chart-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #3b82f6, transparent);
        }

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .chart-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--muted);
        }

        .period-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 4px;
        }

        .period-tab {
            padding: 6px 14px;
            border-radius: 7px;
            font-size: 0.72rem;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.2s;
            border: none;
            background: transparent;
        }

        .period-tab.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #000;
            font-weight: 700;
        }

        .period-tab:hover:not(.active) { color: var(--text); }

        .chart-container { position: relative; height: 240px; }

        /* ── Bottom Grid ── */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .mini-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 26px;
            backdrop-filter: blur(30px);
            animation: fadeUp 0.6s 0.3s ease both;
        }

        .mini-card-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.72rem;
            color: var(--muted);
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* Donut chart centering */
        .donut-wrap {
            position: relative;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .donut-label {
            position: absolute;
            text-align: center;
        }

        .donut-label span {
            display: block;
            font-family: 'Orbitron', monospace;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .donut-label small {
            font-size: 0.65rem;
            color: var(--muted);
            letter-spacing: 2px;
        }

        /* Volume bars */
        .vol-bar-wrap { display: flex; flex-direction: column; gap: 12px; }

        .vol-row { display: flex; align-items: center; gap: 12px; }

        .vol-label {
            font-size: 0.78rem;
            color: var(--muted);
            width: 26px;
            text-align: right;
            flex-shrink: 0;
        }

        .vol-track {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .vol-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transform-origin: left;
            animation: bar-grow 1.2s cubic-bezier(.22,1,.36,1) both;
        }

        @keyframes bar-grow { from { transform: scaleX(0); } }

        .vol-val {
            font-family: 'Orbitron', monospace;
            font-size: 0.72rem;
            color: var(--accent);
            width: 38px;
            text-align: right;
            flex-shrink: 0;
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
            .bottom-grid { grid-template-columns: 1fr; }
            .price-display { grid-template-columns: 1fr; }
            .price-change { text-align: left; }
        }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="wrapper">

    <!-- Header -->
    <header>
        <div class="logo-row">
            <div class="logo-icon">₿</div>
            <h1>CRYPTEX</h1>
        </div>
        <p class="tagline">Real-time crypto intelligence</p>
    </header>

    <!-- Search -->
    <form method="GET">
    <div class="search-wrap">
        <div class="search-icon">⌕</div>
        <input type="text" name="coin" placeholder="Search coin — bitcoin, ethereum..." value="{{ coin }}">
        <button type="submit">TRACK</button>
    </div>
</form>

    <!-- Price Card -->
    <div class="price-card">
        <div class="card-header">
            <div class="coin-info">
                <div class="coin-badge">₿</div>
                <div>
                    <div class="coin-name">{{ coin|title }}</div>
                    <div class="coin-symbol">BTC · CRYPTO</div>
                </div>
            </div>
            <div class="live-badge">
                <div class="live-dot"></div>
                LIVE
            </div>
        </div>

        <div class="price-display">
            <div>
                <div class="price-label">Current Price (INR)</div>
                <div class="price-main">₹ {{ price }}</div>
            </div>
            <div class="price-change">
                <div class="price-label">24H Change</div>
               <div class="change-pill up">▲ {{ change_24h }}%</div>
            </div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">24H High</div>
                <div class="stat-value">₹ {{ high_24h }}</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">24H Low</div>
                <div class="stat-value">₹ {{ low_24h }}</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Market Cap</div>
                <div class="stat-value">₹ {{ market_cap }}</div>
            </div>
        </div>
    </div>

    <!-- Line Chart -->
    <div class="chart-card">
        <div class="chart-header">
            <div class="chart-title">PRICE HISTORY</div>
            <div class="period-tabs">
                <button class="period-tab" onclick="switchPeriod(this,'1D')">1D</button>
                <button class="period-tab active" onclick="switchPeriod(this,'1W')">1W</button>
                <button class="period-tab" onclick="switchPeriod(this,'1M')">1M</button>
                <button class="period-tab" onclick="switchPeriod(this,'1Y')">1Y</button>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="lineChart"></canvas>
        </div>
    </div>

    <!-- Bottom Grid -->
    <div class="bottom-grid">

        <!-- Donut / Sentiment -->
        <div class="mini-card">
            <div class="mini-card-title">MARKET SENTIMENT</div>
            <div class="donut-wrap">
                <canvas id="donutChart" style="max-width:160px;max-height:160px;"></canvas>
                <div class="donut-label">
                    <span>68%</span>
                    <small>BULLISH</small>
                </div>
            </div>
        </div>

        <!-- Volume bars -->
        <div class="mini-card">
            <div class="mini-card-title">HOURLY VOLUME</div>
            <div class="vol-bar-wrap" id="volBars"></div>
        </div>

    </div>
</div>

<script>
/* ✅ FIX: Get price from Django */
const coinPrice = parseFloat("{{ price|default:'0' }}");

/* ─── Demo data generators ─── */
function randWalk(start, steps, vol) {
    let v = start, arr = [v];
    for (let i = 1; i < steps; i++) {
        v += (Math.random() - 0.48) * vol;
        arr.push(Math.max(v, start * 0.7));
    }
    return arr;
}

/* ✅ FIX: Use dynamic price */
const basePrice = (!isNaN(coinPrice) && coinPrice > 0) ? coinPrice : 1000;

const datasets = {
    '1D': { labels: Array.from({length:24}, (_,i)=>`${i}:00`), data: randWalk(basePrice, 24, basePrice*0.01) },
    '1W': { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], data: randWalk(basePrice, 7, basePrice*0.03) },
    '1M': { labels: Array.from({length:30}, (_,i)=>`D${i+1}`), data: randWalk(basePrice, 30, basePrice*0.05) },
    '1Y': { labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], data: randWalk(basePrice, 12, basePrice*0.1) },
};

/* ─── Line Chart ─── */
const lineCtx = document.getElementById('lineChart').getContext('2d');

const gradient = lineCtx.createLinearGradient(0, 0, 0, 240);
gradient.addColorStop(0, 'rgba(247,147,26,0.35)');
gradient.addColorStop(1, 'rgba(247,147,26,0)');

const lineChart = new Chart(lineCtx, {
    type: 'line',
    data: {
        labels: datasets['1W'].labels,
        datasets: [{
            data: datasets['1W'].data,
            borderColor: '#f7931a',
            fill: true,
            backgroundColor: gradient,
            tension: 0.4,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } }
    }
});

function switchPeriod(el, period) {
    document.querySelectorAll('.period-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');

    const d = datasets[period];
    lineChart.data.labels = d.labels;
    lineChart.data.datasets[0].data = d.data;
    lineChart.update();
}

/* ─── Donut Chart ─── */
const donutCtx = document.getElementById('donutChart').getContext('2d');
new Chart(donutCtx, {
    type: 'doughnut',
    data: {
        datasets: [{
            data: [68, 32],
            backgroundColor: ['#f7931a', 'rgba(255,255,255,0.07)']
        }]
    },
    options: {
        cutout: '72%',
        plugins: { legend: { display: false } }
    }
});

/* ─── Volume bars ─── */
const volEl = document.getElementById('volBars');
const vols = [40, 60, 80, 50, 70, 90];

vols.forEach((v, i) => {
    volEl.innerHTML += `
        <div class="vol-row">
            <div class="vol-label">${18+i}H</div>
            <div class="vol-track">
                <div class="vol-fill" style="width:${v}%"></div>
            </div>
            <div class="vol-val">${v}%</div>
        </div>`;
});

/* ✅ FIX: Update stats */
document.querySelectorAll(".stat-value")[0].textContent = "₹ " + Math.round(basePrice * 1.03).toLocaleString("en-IN");
document.querySelectorAll(".stat-value")[1].textContent = "₹ " + Math.round(basePrice * 0.97).toLocaleString("en-IN");
document.querySelectorAll(".stat-value")[2].textContent = "₹ " + Math.round(basePrice * 1000000).toLocaleString("en-IN");

</script>
</body>
</html>
