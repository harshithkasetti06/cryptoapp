<!DOCTYPE html>
<html>
<head>
    <title>Crypto Tracker</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #121212;
            color: white;
        }
        .card {
            background: #1e1e1e;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            display: inline-block;
        }
        input {
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px;
            background: orange;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>🚀 Crypto Price Tracker</h1>

<form method="GET">
    <input type="text" name="coin" placeholder="Enter coin (bitcoin)" required>
    <button type="submit">Search</button>
</form>

<div class="card">
    <h2>{{ coin|title }}</h2>
    <p>₹ {{ price }}</p>
</div>

</body>
</html>
