apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crypto
  template:
    metadata:
      labels:
        app: crypto
    spec:
      containers:
      - name: crypto-container
        image: cryptoapp:latest
        ports:
        - containerPort: 8000